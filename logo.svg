<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1b3354"/>
      <stop offset="100%" stop-color="#060c14"/>
    </linearGradient>

    <!-- Amber gradient (back/duplicate card) -->
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffe080"/>
      <stop offset="100%" stop-color="#c07010"/>
    </linearGradient>

    <!-- Green gradient (front card + glass ring + handle) -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#80f076"/>
      <stop offset="100%" stop-color="#278a22"/>
    </linearGradient>

    <!-- Lens interior gradient -->
    <radialGradient id="lens-bg" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1a3355"/>
      <stop offset="100%" stop-color="#080e18"/>
    </radialGradient>

    <!-- Clip to the lens circle -->
    <clipPath id="lens">
      <circle cx="43" cy="43" r="26"/>
    </clipPath>

    <!-- Subtle glow on the ring and handle -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for the cards -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Top highlight bleed -->
  <ellipse cx="50" cy="-4" rx="52" ry="28" fill="#3b8ef3" opacity="0.07"/>

  <!-- ── Lens interior ── -->
  <circle cx="43" cy="43" r="26" fill="url(#lens-bg)"/>

  <!-- ── Content clipped to lens ── -->
  <g clip-path="url(#lens)">
    <!-- Card 1 — amber (the "duplicate") -->
    <rect x="18" y="27" width="34" height="24" rx="5" fill="url(#amber)" filter="url(#card-shadow)"/>
    <!-- Screen inset -->
    <rect x="23" y="31" width="24" height="16" rx="3" fill="#08111c" opacity="0.5"/>

    <!-- Card 2 — green (the "original") -->
    <rect x="31" y="37" width="34" height="24" rx="5" fill="url(#green)" filter="url(#card-shadow)"/>
    <!-- Screen inset -->
    <rect x="36" y="41" width="24" height="16" rx="3" fill="#08111c" opacity="0.5"/>
  </g>

  <!-- ── Magnifying glass ring ── -->
  <circle cx="43" cy="43" r="26" fill="none" stroke="url(#green)" stroke-width="5" filter="url(#glow)"/>

  <!-- ── Handle ── -->
  <line x1="63" y1="63" x2="87" y2="87" stroke="url(#green)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
</svg>
