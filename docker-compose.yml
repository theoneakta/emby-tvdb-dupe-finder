services:
  emby-tvdb-dupe-finder:
    image: ghcr.io/theoneakta/emby-tvdb-dupe-finder:latest
    build: .
    container_name: emby-tvdb-dupe-finder
    restart: unless-stopped
    ports:
      - "8766:80"          # Left side = host port — change to any free port you like
    env_file:
      - .env               # Copy .env.example → .env and fill in your values
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # check every 5 minutes
      - WATCHTOWER_CLEANUP=true        # remove old images after update
    command: emby-tvdb-dupe-finder     # only watch this container
