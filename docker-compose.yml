services:
  emby-tvdb-dupe-finder:
    build: .
    container_name: emby-tvdb-dupe-finder
    restart: unless-stopped
    ports:
      - "8766:80"          # Left side = host port — change to any free port you like
    env_file:
      - .env               # Copy .env.example → .env and fill in your values
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s