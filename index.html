<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emby Duplicate Finder</title>
<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
.container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
h1 { text-align: center; color: #2c3e50; margin-bottom: 4px; }
.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
.section-title { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .6px; margin: 20px 0 10px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.input-group { margin-bottom: 12px; }
label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 14px; color: #444; }
label .hint { font-weight: 400; color: #bbb; font-size: 12px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border .2s; }
input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,.1); }
hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
.btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; margin-bottom: 8px; transition: background .2s; }
.btn-green  { background: #27ae60; color: white; }
.btn-green:hover  { background: #229954; }
.btn-purple { background: #8e44ad; color: white; }
.btn-purple:hover { background: #7d3c98; }
.btn-blue   { background: #2980b9; color: white; padding: 9px 16px; width: auto; display: inline-block; font-size: 13px; }
.btn-blue:hover   { background: #2471a3; }
.btn-red    { background: #c0392b; color: white; padding: 9px 16px; width: auto; display: inline-block; font-size: 13px; }
.btn-red:hover    { background: #a93226; }

/* Results */
#results { margin-top: 28px; }
.library-box { background: #f8f9fa; border: 1px solid #e9ecef; padding: 20px; margin-bottom: 16px; border-radius: 10px; animation: fadeIn .4s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
.lib-header { font-size: 18px; font-weight: 700; color: #2c3e50; margin: 0 0 4px; }
.lib-sub { font-size: 13px; color: #888; margin: 0 0 16px; }
.section-label { font-size: 13px; font-weight: 700; color: #555; margin: 14px 0 8px; }
details { margin-bottom: 8px; }
details summary { cursor: pointer; font-weight: 600; font-size: 14px; color: #2c3e50; padding: 8px 10px; background: white; border-radius: 6px; border: 1px solid #dee2e6; list-style: none; user-select: none; }
details summary::-webkit-details-marker { display: none; }
details summary::before { content: '▶  '; font-size: 10px; color: #aaa; }
details[open] summary::before { content: '▼  '; }
details ul { padding: 4px 0 0; margin: 0; }

/* File item */
.file-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 8px; border-bottom: 1px solid #f0f0f0; list-style: none; }
.file-item:last-child { border-bottom: none; }
.file-item input[type=checkbox] { margin-top: 4px; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: #c0392b; }
.file-info { flex: 1; min-width: 0; }
.file-folder { font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.file-name { font-size: 14px; font-weight: 700; color: #2c3e50; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.file-name a { font-size: 11px; font-weight: 400; color: #3498db; text-decoration: none; }
.file-name a:hover { text-decoration: underline; }
.file-badge { background: #eaf4fd; color: #2980b9; font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 10px; }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

/* Modal */
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,.7); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: white; border-radius: 12px; padding: 28px; max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
.modal-title { font-size: 18px; font-weight: 700; color: #c0392b; margin: 0 0 10px; }

/* Loading */
#loading-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; color:white; font-size:20px; z-index:1000; gap:10px; }
.hidden { display:none!important; }
</style>
</head>
<body>
<div class="container">
  <h1>🎬 Emby Duplicate Finder</h1>
  <p class="subtitle">Scans your movie libraries for duplicate files and helps you clean them up.</p>

  <div class="section-title">Emby Connection</div>
  <div class="grid-2">
    <div class="input-group">
      <label>Server URL</label>
      <input id="embyServerUrl" placeholder="http://your-emby-server:8096">
    </div>
    <div class="input-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="Your Emby API key">
    </div>
    <div class="input-group">
      <label>Username <span class="hint">required for deletion</span></label>
      <input id="embyUsername" placeholder="Admin username">
    </div>
    <div class="input-group">
      <label>Password <span class="hint">required for deletion</span></label>
      <input type="password" id="embyPassword" placeholder="Admin password">
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:8px;margin:4px 0 16px">
    <input type="checkbox" id="rememberMe" style="width:16px;height:16px;cursor:pointer;accent-color:#27ae60">
    <label for="rememberMe" style="font-size:14px;color:#555;cursor:pointer;font-weight:400;margin:0">Remember me</label>
    <span style="font-size:12px;color:#bbb">(credentials saved in browser only)</span>
  </div>
  <hr>
  <button class="btn btn-green" onclick="findDuplicates(event)">🔍 Scan for Duplicates</button>
  <button class="btn btn-purple" onclick="testConnection(event)">🧪 Test Connection</button>

  <div id="results"></div>
</div>

<div id="loading-overlay" class="hidden">
  <span>Scanning…</span><span id="progress">0%</span>
</div>
<script src="script.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', loadCredentials);
</script>
</body>
</html>
