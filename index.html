<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emby TVDB Duplicates</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px;background:#f5f5f5}
.container{background:white;padding:30px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center;color:#333}
.input-group{margin-bottom:20px}
label{display:block;margin-bottom:5px;font-weight:700}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;font-size:16px}
button{background:#27ae60;color:#fff;padding:14px;border:none;border-radius:5px;cursor:pointer;font-size:16px;width:100%}
button:hover:not(:disabled){background:#229954}
button:disabled{background:#bdc3c7;cursor:not-allowed}
#results{margin-top:30px}
.library-box{background:#ecf0f1;padding:20px;margin-bottom:15px;border-radius:8px;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.download-btn{background:#3498db;padding:10px 20px;font-size:14px;width:auto;margin-top:10px;display:inline-block}
.download-btn:hover{background:#2980b9}
#loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;z-index:1000}
.hidden{display:none!important}
.warning{background:#f39c12;color:#fff;padding:10px;border-radius:5px;margin-bottom:20px}
details ul{margin:5px 0;padding-left:20px;font-family:monospace;font-size:14px}
.test-btn{background:#9b59b6;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🎬 Emby TVDB Duplicate Finder</h1>
  <p>Scans your movie libraries for duplicate files.</p>
  <div class="input-group">
    <label>Server URL:</label>
    <input id="embyServerUrl" placeholder="http://your-emby-server:8096" value="">
  </div>
  <div class="input-group">
    <label>New API Key:</label>
    <input type="password" id="apiKey" placeholder="Regenerate API key first">
  </div>
  <button onclick="findDuplicates(event)">🔍 Scan Duplicates</button>
  <button class="test-btn" onclick="testConnection(event)">🧪 Test Connection</button>
  <div id="results"></div>
</div>
<div id="loading-overlay" class="hidden">Scanning... <span id="progress">0%</span></div>
<script src="script.js"></script>
</body>
</html>
